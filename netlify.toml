[build]
     command = "npm install"
     functions = "netlify/functions"
     publish = "public"

   [[redirects]]
     from = "/api/*"
     to = "/.netlify/functions/:splat"
     status = 200

   [functions]
     external_node_modules = ["express"]
     node_bundler = "esbuild"

   [[plugins]]
     package = "@netlify/plugin-functions-install-core"